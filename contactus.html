<!-- CONTACT SECTION -->
<section id="contact" class="contact-section">
  <div class="contact-container">
    
    <h2>Contact Us</h2>
    <p class="contact-subtext">
      Have questions about buying or selling scrap? Reach out to us. 📞 +91 91728 25756 / +91 9067340097
    </p>

    <form id="contactForm">
      
      <input type="text" id="name" name="name" placeholder="Your Name" required />
      
      <input type="tel" id="number" name="number" placeholder="Your Number" required />
      
      <textarea id="message" name="message" placeholder="Tell us your requirements..." rows="5" required></textarea>
      
      <button type="submit">Send Message</button>
      
      <!-- Success Message -->
      <div class="success-message" id="successMsg">
        Thankyou for connecting, we will call you soon.
      </div>

    </form>

  </div>
</section>

* {

}

}

.contact-container {
  max-width: 1000px;
  margin: 0 auto;

}

.contact-section h2 {
  font-size: 28px;
  margin-bottom: 10px;

  }
